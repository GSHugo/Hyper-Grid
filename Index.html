<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background: #121212; color: #FFFFFF; font-family: 'Segoe UI', sans-serif; padding: 15px; }
    .card { background: #1E1E1E; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    input { width: 100%; padding: 12px; margin: 8px 0; background: #333; color: white; border: 1px solid #444; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .btn-orange { background: #F29D38; color: #000; }
    .btn-blue { background: #3B82F6; color: #fff; }
    .logo { width: 120px; display: block; margin: 0 auto 15px; }
  </style>
</head>
<body>
  <img src="https://i.imgur.com/iFullLogo.png" class="logo"> <h2 style="text-align:center; color:#F29D38;">Hyper Grid</h2>
  
  <div id="sesion" class="card">
    <input type="text" id="cont" placeholder="No. Contenedor">
    <input type="text" id="ubi" placeholder="Ubicación (Ej: TEXCO/FERRAFORME/A/11/N1)">
    <button class="btn-orange" onclick="iniciar()">Iniciar Sesión</button>
  </div>

  <div id="app" class="card" style="display:none;">
    <input type="text" id="busqueda" placeholder="Escanear EAN o Ref...">
    <input type="number" id="cant" placeholder="Cantidad">
    <button class="btn-blue" onclick="guardar()">Registrar</button>
    <button onclick="location.reload()" style="background:#888;">Cerrar Sesión</button>
  </div>

  <script>
    let sesion = { cont: '', ubi: '' };
    function iniciar() {
      sesion.cont = document.getElementById('cont').value;
      sesion.ubi = document.getElementById('ubi').value;
      document.getElementById('sesion').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    }
    async function guardar() {
      const data = {
        action: 'guardar',
        contenedor: sesion.cont,
        ubicacion: sesion.ubi,
        busqueda: document.getElementById('busqueda').value,
        cantidad: document.getElementById('cant').value,
        sku: 'N/A', descripcion: 'N/A'
      };
      // Pega aquí la URL de tu Web App cuando la implementes
      await fetch("TU_URL_DE_APPS_SCRIPT_AQUI", {
        method: 'POST', mode: 'no-cors', body: JSON.stringify(data)
      });
      alert('Registrado con éxito');
      document.getElementById('busqueda').value = '';
    }
  </script>
</body>
</html>
