<script>
  let sesion = { cont: '', ubi: '' };

  function iniciar() {
    sesion.cont = document.getElementById('cont').value.trim();
    sesion.ubi = document.getElementById('ubi').value.trim();
    if (!sesion.cont || !sesion.ubi) {
      alert('Completa contenedor y ubicación');
      return;
    }
    document.getElementById('sesion').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('busqueda').focus();
  }

  async function guardar() {
    const busqueda = document.getElementById('busqueda').value.trim();
    const cantidad = document.getElementById('cant').value;
    if (!busqueda || !cantidad) {
      alert('Escanea un código e ingresa la cantidad');
      return;
    }
    const btn = document.querySelector('.btn-blue');
    btn.disabled = true;
    btn.textContent = 'Guardando...';
    const data = {
      action: 'guardar', contenedor: sesion.cont, ubicacion: sesion.ubi,
      busqueda, cantidad, sku: 'N/A', descripcion: 'N/A'
    };
    try {
      const resp = await fetch("https://script.google.com/macros/s/AKfycbxPQYsCjdQPP8yIezDJuO2kg9ykfdudrj49kBnKf558-_KYC-B-6E_5hRQ7WutLw3jA/exec", {
        method: 'POST', body: JSON.stringify(data)
      });
      const result = await resp.json();
      alert(result.status === 'success' ? 'Registrado con éxito' : 'Error: ' + result.message);
    } catch (err) {
      alert('No se pudo conectar con el servidor');
    } finally {
      document.getElementById('busqueda').value = '';
      document.getElementById('cant').value = '';
      document.getElementById('busqueda').focus();
      btn.disabled = false;
      btn.textContent = 'Registrar';
    }
  }

  // Esto asegura que los elementos ya existan antes de "escucharlos"
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('busqueda').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); document.getElementById('cant').focus(); }
    });
    document.getElementById('cant').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); guardar(); }
    });
  });
</script>
